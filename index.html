<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/stylles.css">
    <link rel="icon" href="icon/estrela.ico">
    <title>Portfólio - Kivia</title>
</head>

<body>

    <header class="cabecalho">
        <h1 class="titulo-principal">Kivia Maria Alves Santos</h1>
    </header>

    <main class="container">

        <section class="card">
            <h2 class="titulo-secao">Sobre Mim</h2>

            <p class="texto">
                Farmando Aura o tempo todo... Aulas de HTML são cools!!
            </p>

            <figure class="imagem-container">
                <img src="img/hello-kitty.png" alt="Hello Kitty">
            </figure>

            <figure class="imagem-container">
                <img src="img.jpg" alt="Farmando aura">
            </figure>
        </section>

        <section class="card">
            <h2 class="titulo-secao">Música 🎵</h2>

            <audio controls class="audio-player">
                <source src="audio/Funk de Beleza (Super Slowed).m4a" type="audio/mp4">
            </audio>
        </section>

        <section class="card">
            <h2 class="titulo-secao">Habilidades</h2>

            <ul class="lista">
                <li>Ser eu</li>
                <li>Amar</li>
                <li>Brincar com todo mundo (incluindo o professor)</li>
            </ul>
        </section>

        <section class="card">
            <h2 class="titulo-secao">Metas</h2>

            <p class="texto">
                Ser verdadeiramente <strong>feliz</strong>.
            </p>

            <a href="https://github.com/star-kivia" target="_blank" class="botao">
                Meu GitHub 💖
            </a>
        </section>

    </main>

    <footer class="rodape">
        <p>📧 Manda um sms para as nuvens</p>
    </footer>

</body>
</html>
